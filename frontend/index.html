<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ML Predictor</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="wrap">
    <header>
      <div>
        <h1>ML Predictor</h1>
        <div class="subtitle">Choose what you want to predict.</div>
        <div id="status">Loading models…</div>
      </div>
      <div class="chip">API: <span id="apiBaseText"></span></div>
    </header>

    <section class="panel chooser" id="chooserView">
      <div class="chooserHead">
        <div>
          <h2>What do you want to predict?</h2>
          <div class="muted">Select one of the options below.</div>
        </div>
        <div
          class="chip"
          id="modelCount"
          style="border-color: rgba(2,6,23,0.10); background: rgba(255,255,255,0.75); color: #0f172a;"
        ></div>
      </div>
      <!-- Hardcoded buttons so they always appear even before JS loads -->
      <div class="cards" id="modelCards">
        <button class="bigBtn color-1" type="button" onclick="selectModel('knn')">
          <div class="title">KNN (Iris)</div>
          <div class="meta">
            <span class="tag">classification</span>
            <span class="tag">4 inputs</span>
          </div>
          <div class="desc">Predict Iris flower species.</div>
        </button>
        <button class="bigBtn color-2" type="button" onclick="selectModel('logistic')">
          <div class="title">Logistic Regression</div>
          <div class="meta">
            <span class="tag">classification</span>
            <span class="tag">30 inputs</span>
          </div>
          <div class="desc">Predict breast cancer (benign/malignant).</div>
        </button>
        <button class="bigBtn color-3" type="button" onclick="selectModel('svm')">
          <div class="title">SVM (Wine)</div>
          <div class="meta">
            <span class="tag">classification</span>
            <span class="tag">13 inputs</span>
          </div>
          <div class="desc">Predict wine cultivar class.</div>
        </button>
        <button class="bigBtn color-4" type="button" onclick="selectModel('mlr')">
          <div class="title">Multiple Linear Reg.</div>
          <div class="meta">
            <span class="tag">regression</span>
            <span class="tag">8 inputs</span>
          </div>
          <div class="desc">Predict California house price.</div>
        </button>
        <button class="bigBtn color-5" type="button" onclick="selectModel('polynomial')">
          <div class="title">Polynomial Reg.</div>
          <div class="meta">
            <span class="tag">regression</span>
            <span class="tag">1 input</span>
          </div>
          <div class="desc">Predict using polynomial curve.</div>
        </button>
      </div>
    </section>

    <section class="panel predictor" id="predictView">
      <div class="predictHead">
        <div class="leftHead">
          <div class="muted">Selected model</div>
          <h2 class="predictTitle" id="predictTitle">Inputs</h2>
          <div class="muted" id="formHint">Ranges are approximate; used for quick validation.</div>
        </div>
        <div style="display:flex; gap: 10px; flex-wrap: wrap; align-items: center;">
          <div class="endpoint" id="endpointPill" style="display:none;"></div>
          <button class="btn" type="button" onclick="goHome()">← Back</button>
        </div>
      </div>

      <div class="content">
        <div id="form" class="grid"></div>

        <div class="actions">
          <div class="muted" id="validationSummary"></div>
          <div style="display:flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn" type="button" onclick="fillExamples()">Fill examples</button>
            <button class="btn primary" type="button" id="predictBtn" onclick="predict()">Predict</button>
          </div>
        </div>

        <div id="result"></div>
      </div>
    </section>

    <div class="footerNote">Tip: ranges/examples come from the backend <code>/models</code> endpoint.</div>
  </div>

  <script src="./app.js" defer></script>
</body>
</html>
